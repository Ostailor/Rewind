name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: rewind-linux-x86_64
          - os: macos-latest
            artifact_name: rewind-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Build release binary
        run: cargo build --release -p rewind-cli

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/rewind "dist/${{ matrix.artifact_name }}"
          tar -C dist -czf "dist/${{ matrix.artifact_name }}.tar.gz" "${{ matrix.artifact_name }}"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/${{ matrix.artifact_name }}.tar.gz" --clobber
